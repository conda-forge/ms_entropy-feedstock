{% set name = "ms_entropy" %}
{% set version = "1.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ms_entropy-{{ version }}.tar.gz
  sha256: 01f9d57489ae2d7e519b8cfed69234f5be5bb5ca0ee4c79220fa4a00085fd9b2
  patches:
    - 0001-setup.patch

build:
  skip: true  # [py<37]
  skip: true  # [py<39 and osx]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - setuptools >=61.0
    - cython >=0.26.1
    - numpy
    - pip
  run:
    - python

test:
  imports:
    - ms_entropy
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/YuanyueLi/MSEntropy
  summary: This package provides a Python implementation of calculating spectral entropy, entropy similarity, and Flash entropy search for mass spectrometry data.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - n-elie
